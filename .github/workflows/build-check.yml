name: Build Check

on:
  push:
    branches: [development]
  pull_request:
    branches: [main]

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-2022
          - name: macOS ARM64
            os: macos-14
          - name: Linux x64
            os: ubuntu-22.04
          - name: Linux ARM64
            os: ubuntu-22.04-arm

    steps:
      - name: Checkout (with PortAudio submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ALSA headers (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Install Xcode CLI tools (macOS)
        if: runner.os == 'macOS'
        run: xcode-select --install || true

      - name: Install dependencies and build
        run: npm install

      - name: Confirm build artifact exists
        shell: bash
        run: |
          if [ ! -f build/Release/micstream.node ]; then
            echo "Build artifact not found — native addon did not compile"
            exit 1
          fi
          echo "Build artifact found: build/Release/micstream.node"
