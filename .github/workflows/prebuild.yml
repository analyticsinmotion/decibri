name: Prebuild

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:

  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:

          # ── Windows x64 ────────────────────────────────────────────────────
          - name: Windows x64
            os: windows-2022
            platform: win32
            arch: x64

          # ── macOS ARM64 (Apple Silicon) ────────────────────────────────────
          - name: macOS ARM64
            os: macos-14
            platform: darwin
            arch: arm64

          # ── Linux x64 ──────────────────────────────────────────────────────
          - name: Linux x64
            os: ubuntu-22.04
            platform: linux
            arch: x64

          # ── Linux ARM64 ────────────────────────────────────────────────────
          - name: Linux ARM64
            os: ubuntu-22.04-arm
            platform: linux
            arch: arm64

    steps:
      - name: Checkout (with PortAudio submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Linux: ALSA headers needed at build time (not runtime) ─────────────
      - name: Install ALSA headers (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      # ── macOS: ensure Xcode CLI tools present (usually pre-installed) ──────
      - name: Install Xcode CLI tools (macOS)
        if: runner.os == 'macOS'
        run: xcode-select --install || true

      # ── Skip the install script to avoid a redundant node-gyp rebuild ──────
      - name: Install npm dependencies
        run: npm install --ignore-scripts

      - name: Build native addon
        run: npm run build

      # ── Place binary where node-gyp-build expects it ───────────────────────
      - name: Stage prebuild artifact
        shell: bash
        run: |
          mkdir -p prebuilds/${{ matrix.platform }}-${{ matrix.arch }}
          cp build/Release/micstream.node \
             prebuilds/${{ matrix.platform }}-${{ matrix.arch }}/node.napi.node

      - name: Upload prebuild artifact
        uses: actions/upload-artifact@v7
        with:
          name: prebuild-${{ matrix.platform }}-${{ matrix.arch }}
          path: prebuilds/${{ matrix.platform }}-${{ matrix.arch }}/
          if-no-files-found: error

  publish:
    name: Publish to npm + GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # ── Download all four platform artifacts ───────────────────────────────
      # actions/download-artifact places each artifact in a subdirectory named
      # after the artifact (e.g. prebuilds/prebuild-win32-x64/). The next step
      # strips the "prebuild-" prefix to match node-gyp-build's expected path.
      - name: Download all prebuild artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: prebuild-*
          path: prebuilds/
          merge-multiple: false

      - name: Reorganise artifacts into prebuilds/{platform}-{arch}/
        shell: bash
        run: |
          for dir in prebuilds/prebuild-*/; do
            target="${dir#prebuilds/prebuild-}"
            target="prebuilds/${target%/}"
            mkdir -p "$target"
            mv "$dir"* "$target/"
            rmdir "$dir"
          done

      # ── Fail loudly if any binary is missing before publish runs ───────────
      - name: Verify all four prebuilds present
        shell: bash
        run: |
          for path in \
            prebuilds/win32-x64/node.napi.node \
            prebuilds/darwin-arm64/node.napi.node \
            prebuilds/linux-x64/node.napi.node \
            prebuilds/linux-arm64/node.napi.node; do
            if [ ! -f "$path" ]; then
              echo "MISSING: $path" && exit 1
            fi
            echo "OK: $path"
          done

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --notes "Release ${{ github.ref_name }}" \
            --repo ${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Attach each .node file to the release for reference ────────────────
      - name: Attach binaries to GitHub Release
        shell: bash
        run: |
          for f in prebuilds/*/*; do
            platform_arch=$(basename "$(dirname "$f")")
            name="${platform_arch}-node.napi.node"
            cp "$f" "$name"
            gh release upload ${{ github.ref_name }} "$name" \
              --repo ${{ github.repository }}
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
