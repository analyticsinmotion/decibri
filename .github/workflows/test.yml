name: Test

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  test:
    name: Static tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - run: sudo apt-get install -y libasound2-dev
      - run: npm install
      - run: npm test
      - run: node test/float32.js
